name: Mirror to Epitech

# Se déclenche à chaque push sur n'importe quelle branche
# C'est ce push qui va aussi envoyer le code vers le repo Epitech
on:
  push:
jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Start ssh-agent and add key
        uses: webfactory/ssh-agent@v0.5.4
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE }}

      - name: Push to mirror
        run: |
          git remote add mirror git@github.com:EpitechMscProPromo2028/T-DEV-600-MLN_1.git
          git push mirror --all
          git push mirror --tags
