name: Mirror

# Se déclenche à chaque push sur n'importe quelle branche
# C'est ce push qui va déclencher les Actions sur le repo miroir
on:
  push:

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 : Mirror vers le repo perso
  # Copie tout le repo Epitech vers ton repo miroir
  # pour que les GitHub Actions puissent tourner dessus
  # ─────────────────────────────────────────────
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Récupère TOUT l'historique git
                         # Sans ça, seul le dernier commit est récupéré
                         # et le mirror serait incomplet

      - name: Push vers le repo miroir
        run: |
          # Ajoute ton repo perso comme remote "mirror"
          # MIRROR_TOKEN = le Personal Access Token créé sur ton compte perso
          # il permet de s'authentifier pour pusher sur ton repo perso
          git remote add mirror https://x-access-token:${{ secrets.MIRROR_TOKEN }}@github.com/AxelEpi/RTC_Strike_back_mirror.git

          # --mirror copie absolument tout vers le repo miroir :
          # - toutes les branches
          # - tous les tags (nécessaire pour déclencher release.yml)
          # - tout l'historique git
          git push mirror --mirror
