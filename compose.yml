
services:
  # Backend API
  api:
    container_name: backend
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "${API_PORT:-4000}:4000"
    volumes:
      - ./api:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - MONGO_URI=mongodb://chatapp_mongo:mongo_password_secure123@mongodb:27017/chatapp_db?authSource=admin
      - JWT_SECRET=${JWT_SECRET}
      - API_PORT=${API_PORT}
    depends_on:
      - postgres
      - mongodb
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - app-network

  # Frontend Next.js
  frontend:
    container_name: frontend
    build:
      context: ./my-app
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - ./my-app:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    depends_on:
      - api
    networks:
      - app-network

  # PostgreSQL Database
  postgres:
    container_name: postgres
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - app-network

  # MongoDB Database
  mongodb:
    container_name: mongodb
    image: mongo:7-jammy
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - app-network

  # Adminer (DB admin)
  adminer:
    container_name: adminer
    image: adminer:latest
    restart: always
    ports:
      - "${AD_PORT:-7777}:8080"
    depends_on:
      - postgres
    networks:
      - app-network

  # Test Runner - Lance les tests automatiquement (se lance en dernier)
  test-runner:
    container_name: test-runner
    build:
      context: ./api
      dockerfile: Dockerfile
    working_dir: /app
    volumes:
      - ./api:/app
      - /app/node_modules
    environment:
      - NODE_ENV=test
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - MONGO_URI=mongodb://chatapp_mongo:mongo_password_secure123@mongodb:27017/chatapp_db?authSource=admin
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - postgres
      - mongodb
      - api
    command: >
      sh -c "
        echo '🧪 Waiting for all services to be ready...' &&
        sleep 15 &&
        echo '🧪 Starting tests...' &&
        npm test &&
        echo '✅ Tests completed!'
      "
    networks:
      - app-network

volumes:
  postgres_data:
  mongo_data:

networks:
  app-network:
    driver: bridge