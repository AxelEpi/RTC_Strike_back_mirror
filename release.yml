name: Release

# Se déclenche UNIQUEMENT quand tu crées un tag au format vX.X.X
# Exemple : git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags:
      - "v*.*.*"

# Droit d'écriture nécessaire pour créer des Releases et uploader des assets
permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 : Création de la Release GitHub
  # Crée la page Release sur GitHub avec les notes automatiques
  # Les autres jobs attendent que celui-ci soit terminé
  # ─────────────────────────────────────────────
  create_release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Create release
        id: create_release # ID pour que les autres jobs puissent référencer ce job
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Token généré automatiquement par GitHub
        with:
          tag_name: ${{ github.ref_name }}   # Nom du tag ex: v1.0.0
          name: Release ${{ github.ref_name }} # Titre de la release ex: "Release v1.0.0"
          generate_release_notes: true         # Génère automatiquement les notes depuis les commits

  # ─────────────────────────────────────────────
  # JOB 2 : Build et upload du Frontend
  # Compile my-app et uploade le zip sur la Release
  # ─────────────────────────────────────────────
  create_binary_nodejs:
    name: Build & Upload Frontend
    runs-on: ubuntu-latest
    needs: create_release # Attend que le Job 1 soit terminé avant de démarrer
    defaults:
      run:
        working-directory: ./my-app
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install

      - name: Build the project
        # Compile le front, génère dist/
        run: npm run build

      - name: Create zip to deploy
        # Crée une archive avec le build et les fichiers utiles
        # ../ pour sortir de ./my-app et mettre le zip à la racine
        run: zip -r ../release-frontend.zip dist package.json README.md

      - name: Upload frontend binary
        # Upload le zip comme asset téléchargeable sur la Release GitHub
        uses: softprops/action-gh-release@v2
        with:
          files: release-frontend.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────
  # JOB 3 : Build et upload du Backend
  # Compile api/ et uploade le zip sur la même Release
  # Tourne EN PARALLÈLE avec le Job 2
  # ─────────────────────────────────────────────
  create_binary_api:
    name: Build & Upload Backend
    runs-on: ubuntu-latest
    needs: create_release # Attend aussi que le Job 1 soit terminé
    defaults:
      run:
        working-directory: ./api
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install

      - name: Build the project
        run: npm run build

      - name: Create zip to deploy
        run: zip -r ../release-api.zip dist package.json README.md

      - name: Upload api binary
        uses: softprops/action-gh-release@v2
        with:
          files: release-api.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}